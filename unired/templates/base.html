<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}UniRed{% endblock %}</title>
<style>
  :root {
    --bg: #f4f2ee;
    --surface: #ffffff;
    --border: #e2e0d8;
    --text: #1c1c1a;
    --muted: #6b6a65;
    --hint: #9b9a96;
    --accent: #e85d04;
    --accent-light: #fff3ee;
    --blue: #185fa5;
    --blue-light: #e6f1fb;
    --green: #1d9e75;
    --green-light: #e1f5ee;
    --purple: #534ab7;
    --purple-light: #eeedfe;
    --amber: #ba7517;
    --amber-light: #faeeda;
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; font-size: 15px; }
  a { color: inherit; text-decoration: none; }

  /* NAV */
  nav { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; height: 52px; gap: 12px; }
  .nav-logo { font-size: 20px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
  .nav-logo span { color: var(--text); font-weight: 400; }
  .nav-search { flex: 1; max-width: 340px; }
  .nav-search input { width: 100%; padding: 7px 14px; border: 1px solid var(--border); border-radius: 20px; font-size: 13px; background: var(--bg); color: var(--text); outline: none; }
  .nav-search input:focus { border-color: var(--accent); }
  .nav-links { display: flex; align-items: center; gap: 6px; margin-left: auto; }
  .btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid transparent; transition: all 0.15s; }
  .btn-outline { border-color: var(--border); color: var(--muted); background: none; }
  .btn-outline:hover { background: var(--bg); border-color: var(--text); color: var(--text); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { opacity: 0.88; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .user-badge { display: flex; align-items: center; gap: 7px; padding: 5px 12px; border-radius: 20px; background: var(--bg); border: 1px solid var(--border); font-size: 13px; }
  .avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--accent-light); color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }

  /* LAYOUT */
  .layout { max-width: 1100px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: 200px 1fr 240px; gap: 16px; align-items: start; }
  @media (max-width: 860px) { .layout { grid-template-columns: 1fr; } .sidebar-left, .sidebar-right { display: none; } }

  /* SIDEBAR */
  .sidebar { display: flex; flex-direction: column; gap: 5px; }
  .sidebar-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
  .sidebar-card-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
  .nav-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: var(--radius-sm); font-size: 13px; color: var(--muted); cursor: pointer; transition: all 0.12s; }
  .nav-item:hover, .nav-item.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

  /* POST CARD */
  .post-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; display: flex; gap: 12px; transition: border-color 0.15s; }
  .post-card:hover { border-color: #c9c7bf; }
  .vote-col { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 32px; }
  .vote-btn { background: none; border: none; cursor: pointer; color: var(--hint); font-size: 18px; line-height: 1; padding: 2px; border-radius: 4px; transition: all 0.12s; }
  .vote-btn:hover { color: var(--accent); }
  .vote-btn.active { color: var(--accent); }
  .vote-count { font-size: 13px; font-weight: 600; color: var(--text); }
  .post-body-wrap { flex: 1; min-width: 0; }
  .post-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .tag-badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
  .tag-news { background: var(--blue-light); color: var(--blue); }
  .tag-event { background: var(--green-light); color: var(--green); }
  .tag-discuss { background: var(--purple-light); color: var(--purple); }
  .tag-help { background: var(--amber-light); color: var(--amber); }
  .tag-admin { background: var(--accent-light); color: var(--accent); }
  .post-author { font-size: 12px; color: var(--muted); }
  .post-time { font-size: 12px; color: var(--hint); }
  .pinned-mark { font-size: 11px; color: var(--green); font-weight: 600; }
  .post-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 5px; line-height: 1.4; }
  .post-title a:hover { color: var(--accent); }
  .post-excerpt { font-size: 13px; color: var(--muted); margin-bottom: 9px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .post-actions { display: flex; gap: 8px; }
  .action-link { font-size: 12px; color: var(--hint); padding: 3px 7px; border-radius: 4px; transition: all 0.12s; }
  .action-link:hover { background: var(--bg); color: var(--muted); }

  /* FEED TOP BAR */
  .feed-topbar { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .filter-pill { font-size: 12px; padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; transition: all 0.12s; text-decoration: none; display: inline-block; }
  .filter-pill:hover { border-color: var(--accent); color: var(--accent); }
  .filter-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* EVENT CARD */
  .event-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
  .event-item:last-child { border-bottom: none; padding-bottom: 0; }
  .event-date { font-size: 11px; font-weight: 600; color: var(--blue); margin-bottom: 3px; }
  .event-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .event-loc { font-size: 11px; color: var(--hint); margin-top: 2px; }

  /* FORMS */
  .form-page { max-width: 640px; margin: 40px auto; padding: 0 20px; }
  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 32px; }
  .form-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .form-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
  input[type=text], input[type=email], input[type=password], input[type=datetime-local], select, textarea {
    width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-size: 14px; color: var(--text); background: var(--surface); outline: none; font-family: inherit; transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 100px; line-height: 1.5; }
  .tag-select { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
  .tag-opt { display: none; }
  .tag-opt + label { padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); font-size: 12px; font-weight: 500; color: var(--muted); cursor: pointer; transition: all 0.12s; }
  .tag-opt:checked + label { border-color: currentColor; }
  #tag_news:checked + label { background: var(--blue-light); color: var(--blue); border-color: var(--blue); }
  #tag_event:checked + label { background: var(--green-light); color: var(--green); border-color: var(--green); }
  #tag_discuss:checked + label { background: var(--purple-light); color: var(--purple); border-color: var(--purple); }
  #tag_help:checked + label { background: var(--amber-light); color: var(--amber); border-color: var(--amber); }
  #tag_admin:checked + label { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
  .form-error { background: #fee; color: #c33; padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 16px; border: 1px solid #fcc; }
  .form-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; border-top: 1px solid var(--border); padding-top: 18px; }
  .form-link { font-size: 13px; color: var(--muted); margin-top: 16px; text-align: center; }
  .form-link a { color: var(--accent); }

  /* DETAIL PAGE */
  .detail-wrap { max-width: 720px; }
  .comment-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }
  .comment-meta { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .comment-body { font-size: 14px; line-height: 1.6; }
  .comment-form { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
  .comment-form textarea { min-height: 70px; margin-bottom: 10px; }
  .comments-title { font-size: 15px; font-weight: 600; margin: 20px 0 12px; }

  /* EVENTS PAGE */
  .events-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .event-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
  .event-card-date { font-size: 12px; font-weight: 700; color: var(--blue); margin-bottom: 8px; }
  .event-card-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
  .event-card-desc { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 10px; }
  .event-card-loc { font-size: 12px; color: var(--hint); }
  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .page-header h1 { font-size: 22px; font-weight: 700; }
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="/" class="nav-logo">Uni<span>Red</span></a>
    <div class="nav-search">
      <form method="get" action="/">
        <input type="text" name="q" placeholder="Поиск..." value="{{ request.args.get('q','') }}">
      </form>
    </div>
    <div class="nav-links">
      <a href="/events" class="btn btn-outline btn-sm">📅 Ивенты</a>
      {% if user %}
        <a href="/post/new" class="btn btn-primary btn-sm">+ Пост</a>
        <div class="user-badge">
          <div class="avatar">{{ user.username[0].upper() }}</div>
          <span>{{ user.username }}</span>
        </div>
        <a href="/logout" class="btn btn-outline btn-sm">Выйти</a>
      {% else %}
        <a href="/login" class="btn btn-outline btn-sm">Войти</a>
        <a href="/register" class="btn btn-primary btn-sm">Регистрация</a>
      {% endif %}
    </div>
  </div>
</nav>

{% block content %}{% endblock %}

</body>
</html>
