{% extends "base.html" %}
{% block title %}Новый пост — UniRed{% endblock %}
{% block content %}
<div class="form-page">
  <div class="form-card">
    <div class="form-title">Создать пост</div>
    <div class="form-sub">Поделитесь информацией с сообществом университета</div>
    <form method="post">
      <div class="form-group">
        <label>Категория</label>
        <div class="tag-select">
          <input class="tag-opt" type="radio" name="tag" id="tag_discuss" value="discuss" checked>
          <label for="tag_discuss">💬 Обсуждение</label>
          <input class="tag-opt" type="radio" name="tag" id="tag_news" value="news">
          <label for="tag_news">📰 Новости</label>
          <input class="tag-opt" type="radio" name="tag" id="tag_help" value="help">
          <label for="tag_help">🙋 Вопрос</label>
          <input class="tag-opt" type="radio" name="tag" id="tag_event" value="event">
          <label for="tag_event">🎉 Ивент</label>
          {% if user.role in ['admin','moderator'] %}
          <input class="tag-opt" type="radio" name="tag" id="tag_admin" value="admin">
          <label for="tag_admin">📌 Объявление</label>
          {% endif %}
        </div>
      </div>
      <div class="form-group">
        <label for="title">Заголовок *</label>
        <input type="text" id="title" name="title" placeholder="О чём ваш пост?" required maxlength="120">
      </div>
      <div class="form-group">
        <label for="body">Текст *</label>
        <textarea id="body" name="body" placeholder="Подробнее о теме..." required></textarea>
      </div>
      <div class="form-footer">
        <a href="/" class="btn btn-outline">Отмена</a>
        <button type="submit" class="btn btn-teal">Опубликовать</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
