{% extends "base.html" %}
{% block title %}Вход — UniRed{% endblock %}
{% block content %}
<div class="form-page">
  <div class="form-card">
    <div class="form-title">Вход</div>
    <div class="form-sub">Войдите в аккаунт UniRed</div>
    {% if error %}<div class="form-error">{{ error }}</div>{% endif %}
    <form method="post">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required placeholder="your@uni.kz" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" name="password" required placeholder="••••••••" autocomplete="current-password">
      </div>
      <div class="form-footer">
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Войти</button>
      </div>
    </form>
    <p class="form-link">Нет аккаунта? <a href="/register">Зарегистрироваться</a></p>
    <p style="font-size:11px;color:var(--hint);text-align:center;margin-top:10px">
      Тест: admin@uni.kz / admin123 · arman@uni.kz / student123
    </p>
  </div>
</div>
{% endblock %}
